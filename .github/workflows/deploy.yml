name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive repository
        run: |
          tar \
            --exclude=./.git \
            --exclude=./node_modules \
            --exclude=./plateforme-tests/node_modules \
            --exclude=./plateforme-back/.venv \
            --exclude=./plateforme-back/__pycache__ \
            --exclude=./.venv \
            -czf /tmp/app.tar.gz .

      - name: Copy archive to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "/tmp/app.tar.gz"
          target: "/home/${{ secrets.VPS_USER }}/deploy"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            mkdir -p ~/deploy/app
            rm -rf ~/deploy/app/*
            tar -xzf ~/deploy/app.tar.gz -C ~/deploy/app

            cd ~/deploy/app
            export NGINX_PORT=80

            if [ -f docker-compose.yml ]; then
              docker compose down || docker-compose down
              docker compose up -d --build || docker-compose up -d --build

            elif command -v docker >/dev/null 2>&1 && [ -f plateforme-back/Dockerfile ]; then
              docker build -t plateforme-back ./plateforme-back
              docker rm -f plateforme-back || true
              docker run -d --name plateforme-back -p 8000:8000 plateforme-back

            else
              echo "No docker setup found"
            fi