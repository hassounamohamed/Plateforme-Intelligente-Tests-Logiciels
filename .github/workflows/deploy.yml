name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive repository
        run: |
          tar \
            --exclude=./.git \
            --exclude=./node_modules \
            --exclude=./plateforme-tests/node_modules \
            --exclude=./plateforme-back/.venv \
            --exclude=./plateforme-back/__pycache__ \
            --exclude=./.venv \
            -czf /tmp/app.tar.gz .

      - name: Copy archive to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "/tmp/app.tar.gz"
          target: "/home/${{ secrets.VPS_USER }}/deploy"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            mkdir -p ~/deploy/app
            if [ ! -f ~/deploy/backend.env ]; then
              echo "Missing backend env file at ~/deploy/backend.env"
              echo "Create it once on the VPS, then rerun the deploy."
              exit 1
            fi

            rm -rf ~/deploy/app/* ~/deploy/app.tar.gz

            ARCHIVE_PATH=$(find ~/deploy -maxdepth 2 -name app.tar.gz | head -n 1)
            if [ -z "$ARCHIVE_PATH" ]; then
              echo "app.tar.gz was not found under ~/deploy"
              exit 1
            fi

            tar -xzf "$ARCHIVE_PATH" -C ~/deploy/app
            cp ~/deploy/backend.env ~/deploy/app/plateforme-back/.env

            cd ~/deploy/app
            export NGINX_PORT=80
            export NEXT_PUBLIC_API_URL=http://51.255.202.68

            if [ -f docker-compose.yml ]; then
              if command -v docker-compose >/dev/null 2>&1; then
                docker-compose down --remove-orphans || true
                docker rm -f frontend backend nginx postgres_db || true
                docker-compose up -d --build --force-recreate
              else
                docker compose down --remove-orphans || true
                docker rm -f frontend backend nginx postgres_db || true
                docker compose up -d --build --force-recreate
              fi

            elif command -v docker >/dev/null 2>&1 && [ -f plateforme-back/Dockerfile ]; then
              docker build -t plateforme-back ./plateforme-back
              docker rm -f plateforme-back || true
              docker run -d --name plateforme-back -p 8000:8000 plateforme-back

            else
              echo "No docker setup found"
            fi