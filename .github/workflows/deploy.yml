name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive repository
        run: |
          git rev-parse --show-toplevel || true
          tar --exclude=.git --exclude=node_modules -czf app.tar.gz .

      - name: Copy archive to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "app.tar.gz"
          target: "/home/${{ secrets.VPS_USER }}/deploy"

      - name: Deploy on VPS (extract & launch)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            mkdir -p ~/deploy
            tar -xzf ~/deploy/app.tar.gz -C ~/deploy/app || true
            cd ~/deploy/app
            if [ -f docker-compose.yml ]; then
              docker-compose pull || true
              docker-compose up -d --build
            elif command -v docker >/dev/null 2>&1 && [ -f plateforme-back/Dockerfile ]; then
              docker build -t plateforme-back ./plateforme-back
              docker run -d --rm --name plateforme-back -p 8000:8000 plateforme-back
            else
              echo "No docker-compose.yml or Dockerfile found; adjust deploy script on VPS"
            fi
